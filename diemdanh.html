<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thông tin Điểm danh</title>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
        line-height: 1.6;
      }
      .box {
        border: 2px solid #333;
        padding: 20px;
        max-width: 600px;
        margin: auto;
        border-radius: 10px;
      }
      h2 {
        color: #d32f2f;
        text-transform: uppercase;
      }
      .info-row {
        margin-bottom: 10px;
        font-size: 18px;
      }
      .label {
        font-weight: bold;
        width: 150px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Thông Tin Sinh Viên</h2>
      <div class="info-row">
        <span class="label">Họ và tên:</span> [Họ tên của bạn]
      </div>
      <div class="info-row">
        <span class="label">MSSV:</span> [MSSV của bạn]
      </div>
      <div class="info-row">
        <span class="label">Học phần:</span> Lập trình Web
      </div>
      <div class="info-row">
        <span class="label">Link Deploy:</span>
        <a href="https://[username].github.io/710-[MSSV]/" target="_blank"
          >Nhấn để xem kết quả</a
        >
      </div>
    </div>
  </body>
</html>
